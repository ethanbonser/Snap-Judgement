<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Judgment | Game Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20">
</head>
<body class="board-page">
    <div id="setup-menu" class="overlay-screen active">
        <div class="overlay-box">
            <h1 style="font-family: Bangers; font-size: 3rem; color: var(--gold);">GAME SETUP</h1>
            <div style="margin: 20px 0; text-align: left; font-family: Fredoka; font-size: 0.8rem; line-height: 1.5; color: var(--text-muted);">
                <p>1. Library reveals a question.</p>
                <p>2. Players submit the funniest answer.</p>
                <p>3. Vote for the winner!</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <select id="setup-players"><option value="2">2 PLAYERS</option><option value="3">3 PLAYERS</option><option value="4">4 PLAYERS</option></select>
                <button id="start-game-btn" class="btn-green">BEGIN GAME</button>
            </div>
        </div>
    </div>

    <div id="winner-modal" class="overlay-screen">
        <div class="overlay-box">
            <h2 id="modal-winner-name" style="font-family: Bangers; font-size: 3rem; color: var(--gold);"></h2>
            <p id="modal-funny-msg" style="font-family: Fredoka; margin: 20px 0;"></p>
            <button id="next-round-btn" class="btn-gold">NEXT ROUND</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <h1 style="font-family: Bangers; font-size: 3rem; text-shadow: 4px 4px 0 black;">SNAP JUDGMENT</h1>
            <p class="studio-tag">CHILLVIBEZ STUDIOS</p>
        </header>

        <main class="board-layout" id="main-board-area">
            <p>Initializing...</p>
        </main>

        <footer>
            <div style="font-size: 0.5rem; color: var(--text-muted); margin-bottom: 10px;">ROOM ID: 192-168-0-153</div>
            <button id="shuffle-btn" class="btn-red">RESET ALL</button>
        </footer>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="cards.js"></script>
    <script src="prompts.js"></script>
    <script src="sync-board.js"></script>
</body>
</html>
