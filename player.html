<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Judgement | Player Phone</title>
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        #send-to-pile-btn {
            background: #27ae60; /* Soft green for action */
            font-size: 1.2rem;
            width: 100%;
            max-width: 300px;
            padding: 20px;
        }
        #send-to-pile-btn:disabled {
            background: #444;
            opacity: 0.5;
        }
        .player-id-select {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header>
            <h1 class="studio-name">ChillVibez Studios</h1>
            <div class="player-id-select">
                <select id="player-role" style="background: var(--card-bg); color: white; padding: 5px; border-radius: 5px; border: 1px solid var(--accent-color);">
                    <option value="p1">Player 1</option>
                    <option value="p2">Player 2</option>
                </select>
            </div>
        </header>

        <main>
            <div id="card-area">
                <div class="card" id="main-card">
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front">
                            <!-- Populated by script -->
                            <div class="card-header">
                                <span class="card-type" id="card-category">DRAW A CARD</span>
                                <span class="card-id" id="card-number">#---</span>
                            </div>
                            <div class="card-illustration">
                                <span id="card-emoji">🃏</span>
                            </div>
                            <div class="content-wrapper">
                                <p id="card-text">Click to choose your card!</p>
                            </div>
                            <div class="card-footer">
                                <div class="stat-box">
                                    <span class="stat-label">AWKWARDNESS</span>
                                    <div class="stat-bar"><div class="stat-fill" id="stat-awkward"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="player-controls">
                <button id="send-to-pile-btn" disabled>Send to Pile 🚀</button>
                <p id="status-msg" style="color: var(--text-dim); font-size: 0.8rem;">Pick a card first!</p>
            </div>
        </main>

        <footer>
            <p id="stats">Room: <span style="color: var(--accent-color)">CHILL-1</span></p>
        </footer>
    </div>

    <script src="cards.js"></script>
    <script type="module" src="sync-player.js"></script>
</body>
</html>
