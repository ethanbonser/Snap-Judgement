<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Judgement | Player Phone</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="player-page">
    <div class="game-container">
        <header>
            <h1 class="studio-name">ChillVibez Studios</h1>
            <div class="player-id-select">
                <select id="player-role" style="background: var(--card-bg); color: white; padding: 5px; border-radius: 5px; border: 1px solid var(--accent-color);">
                    <option value="p1">Player 1</option>
                    <option value="p2">Player 2</option>
                </select>
            </div>
        </header>

        <main>
            <!-- The Fanned Hand -->
            <div id="player-hand" class="player-hand">
                <!-- Cards will be injected here -->
            </div>
            
            <p id="stats" style="margin-top: 20px;">Touch a card to focus</p>
        </main>

        <!-- Focused View Overlay -->
        <div id="focus-overlay">
            <div id="focused-card-slot">
                <!-- The enlarged card will be cloned here -->
            </div>
            
            <div class="focus-controls">
                <button id="send-to-pile-btn">Send to Pile 🚀</button>
                <button id="close-focus-btn">Close Card</button>
            </div>
        </div>

        <footer>
            <p id="stats">Room: <span style="color: var(--accent-color)">CHILL-1</span></p>
        </footer>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="cards.js"></script>
    <script src="sync-player.js"></script>
</body>
</html>
